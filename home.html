<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        header {
            background: #333;
            color: #fff;
            padding: 15px 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: auto;
        }

        nav h1 {
            font-size: 24px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
        }

        nav ul li a:hover {
            color: #f4b400;
        }

        .hero {
            height: 80vh;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .hero h2 {
            font-size: 40px;
        }

        .hero p {
            margin: 15px 0;
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #fff;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
        }

        .features {
            padding: 40px 20px;
            text-align: center;
        }

        .features h2 {
            margin-bottom: 20px;
        }

        .feature-box {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .box {
            width: 30%;
            padding: 20px;
            margin: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <h1>MySite</h1>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h2>Welcome to My Website</h2>
            <p>Build something amazing today</p>
            <a href="#" class="btn">Get Started</a>
        </div>
    </section>

    <section class="features">
        <h2>Our Features</h2>
        <div class="feature-box">
            <div class="box">
                <h3>Fast</h3>
                <p>Optimized for performance and speed.</p>
            </div>
            <div class="box">
                <h3>Responsive</h3>
                <p>Looks great on all devices.</p>
            </div>
            <div class="box">
                <h3>Easy to Use</h3>
                <p>Simple and clean design.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 MySite. All rights reserved.</p>
    </footer>

</body>
</html>
